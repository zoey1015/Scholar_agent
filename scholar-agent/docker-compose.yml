version: "3.9"

services:
  # ========================
  # Infrastructure Layer
  # ========================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: scholar-postgres
    environment:
      POSTGRES_USER: scholar
      POSTGRES_PASSWORD: scholar_dev_123
      POSTGRES_DB: scholar_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholar"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scholar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.4
    container_name: scholar-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: scholar-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: scholar_minio
      MINIO_ROOT_PASSWORD: scholar_minio_123
    ports:
      - "9010:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  grobid:
    image: lfoppiano/grobid:0.8.1
    container_name: scholar-grobid
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 180s

  # ========================
  # Application Layer
  # ========================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scholar-backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /data/spicaKJY/.cache/modelscope:/app/modelscope_cache
    environment:
      - TRANSFORMERS_OFFLINE=1
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy


  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scholar-celery
    command: celery -A backend.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - /data/spicaKJY/.cache/modelscope:/app/modelscope_cache
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    environment:
      - TRANSFORMERS_OFFLINE=1
      - HF_DATASETS_OFFLINE=1
      - SENTENCE_TRANSFORMERS_HOME=/app/modelscope_cache/hub


  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scholar-frontend
    command: streamlit run frontend/app.py --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/modelscope:/root/.cache/modelscope
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  milvus_data:
  minio_data:

